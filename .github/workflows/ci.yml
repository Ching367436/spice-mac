name: CI

on:
  push:
    branches: [main]
  pull_request:

# The full app needs Xcode's Metal toolchain and the native SPICE sysroot, neither
# of which CI fetches. These jobs cover what builds and tests with only the Swift
# toolchain: the .vv parser and the macOS-keycode → scancode map (28 checks).
# The CocoaSpice fork patch is syntax-checked as part of the local Xcode build
# (it needs the Metal/CocoaSpiceRenderer modules, so it can't run standalone here).

jobs:
  swift-tests:
    name: Pure-Swift checks
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: VVConfig — .vv parser checks
        working-directory: Packages/VVConfig
        run: swift run vvcheck

      - name: SpiceInputMap — keycode → scancode checks
        working-directory: Packages/SpiceInputMap
        run: swift run inputcheck

      - name: Version consistency (Info.plist / CHANGELOG / links)
        run: ./scripts/check-version.sh

  shell-lint:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck scripts
        run: shellcheck --severity=warning -x scripts/*.sh
